# ==========================================
# Orquestia BPM Studio - Application Config
# ==========================================

spring.application.name=orquestia-backend

# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://orquestia:orquestia2026@localhost:27017/orquestia_db?authSource=admin

# JWT Configuration
app.jwt.secret=OrquestiaBPMStudio2026SecretKeyForJWTTokenGenerationMustBeLongEnough256Bits!!
app.jwt.expiration=86400000

# CORS - Allow Angular dev server
app.cors.allowed-origins=http://localhost:4200

# Logging
logging.level.com.orquestia=DEBUG
logging.level.org.springframework.security=INFO

# Dev tools
spring.devtools.restart.enabled=true
